# Codemagic CI/CD — GasCap iOS (Capacitor shell → TestFlight)
#
# This builds the native iOS wrapper that loads the live site (https://www.gascap.app/?native=ios).
# The iOS Xcode project is generated fresh in CI (`npx cap add ios`) so nothing
# iOS-specific needs to live in the repo or on a local Mac.
#
# ── ONE-TIME SETUP (in the Codemagic web UI) ────────────────────────────────────
# 1. Team settings → Integrations → App Store Connect → connect your API key
#    (Issuer ID + Key ID + .p8). Name the integration EXACTLY:  GasCap_ASC
# 2. App Store Connect → My Apps: "GasCap" app record bound to bundle id app.gascap.ios (already created)
# 3. Connect this GitHub repo in Codemagic, pick the `ios-capacitor` workflow, Start build.
# ────────────────────────────────────────────────────────────────────────────────

workflows:
  ios-capacitor:
    name: GasCap iOS (Capacitor → TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: ios-capacitor
          include: true
    integrations:
      app_store_connect: GasCap_ASC      # ← must match the integration name in Codemagic
                                         # (injects the ASC API creds the signing step uses)
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.gascap.ios"
        APP_APPLE_ID: "6761315915"   # numeric App Store Connect app id (for build-number lookup)
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Generate the iOS project (Capacitor)
        script: |
          # Always regenerate ios/ from scratch so the Podfile reflects the
          # exact set of plugins currently in package.json. An incremental
          # cap sync on a stale ios/ can silently omit newly-added plugins
          # (e.g. @capacitor/geolocation) from the Podfile → "not implemented".
          rm -rf ios

          npx cap add ios
          npx cap sync ios

      - name: Generate app icon + splash from the orange brand mark
        script: |
          # Bakes assets/icon-only.png + assets/splash*.png into the iOS AppIcon
          # set + LaunchScreen (replaces the default Capacitor placeholder icon).
          npx capacitor-assets generate --ios

      - name: Mark app as export-compliance exempt (HTTPS only)
        script: |
          # GasCap only uses standard HTTPS (exempt encryption). Setting this key
          # auto-answers the TestFlight/App Store "export compliance" question so it
          # never prompts on upload.
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

      - name: Ensure location permission usage strings are in Info.plist
        script: |
          # @capacitor/geolocation needs NSLocationWhenInUseUsageDescription to be
          # present or iOS silently blocks CoreLocation and never fires the callback.
          # cap sync should add it automatically, but we set it explicitly as a
          # safety net in case the plugin didn't inject it.
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy \
            -c "Add :NSLocationWhenInUseUsageDescription string 'GasCap uses your location to find nearby gas stations and their current fuel prices.'" \
            "$PLIST" \
            || /usr/libexec/PlistBuddy \
            -c "Set :NSLocationWhenInUseUsageDescription 'GasCap uses your location to find nearby gas stations and their current fuel prices.'" \
            "$PLIST"
          # NSLocationAlwaysAndWhenInUseUsageDescription — required for background
          # geofencing alerts via @capacitor-community/background-geolocation.
          /usr/libexec/PlistBuddy \
            -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'GasCap uses your location in the background to alert you when you are near a gas station you have saved.'" \
            "$PLIST" \
            || /usr/libexec/PlistBuddy \
            -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'GasCap uses your location in the background to alert you when you are near a gas station you have saved.'" \
            "$PLIST"
          # NSFaceIDUsageDescription — required by @aparajita/capacitor-biometric-auth
          # for Face ID; without it Apple rejects the build at upload time.
          /usr/libexec/PlistBuddy \
            -c "Add :NSFaceIDUsageDescription string 'GasCap uses Face ID to sign you in quickly and securely.'" \
            "$PLIST" \
            || /usr/libexec/PlistBuddy \
            -c "Set :NSFaceIDUsageDescription 'GasCap uses Face ID to sign you in quickly and securely.'" \
            "$PLIST"
          # NSCameraUsageDescription + NSPhotoLibraryUsageDescription — MANDATORY.
          # WKWebView <input type="file" accept="image/*"> invokes the native camera
          # (UIImagePickerController) and photo picker under the hood. iOS HARD-CRASHES
          # the app the instant either is invoked if these strings are missing — this
          # was the VIN-scan / gauge-scan / receipt-scan crash. No web/JS change can
          # fix it; the keys must live in the signed binary's Info.plist.
          /usr/libexec/PlistBuddy \
            -c "Add :NSCameraUsageDescription string 'GasCap uses the camera to scan your fuel gauge, VIN, and gas receipts.'" \
            "$PLIST" \
            || /usr/libexec/PlistBuddy \
            -c "Set :NSCameraUsageDescription 'GasCap uses the camera to scan your fuel gauge, VIN, and gas receipts.'" \
            "$PLIST"
          /usr/libexec/PlistBuddy \
            -c "Add :NSPhotoLibraryUsageDescription string 'GasCap accesses your photo library so you can upload a photo of your fuel gauge, VIN, or gas receipt.'" \
            "$PLIST" \
            || /usr/libexec/PlistBuddy \
            -c "Set :NSPhotoLibraryUsageDescription 'GasCap accesses your photo library so you can upload a photo of your fuel gauge, VIN, or gas receipt.'" \
            "$PLIST"
          echo "Info.plist camera key:"; /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST"
          echo "Info.plist photos key:"; /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription" "$PLIST"
          # UIApplicationShortcutItems — long-press home screen quick actions
          /usr/libexec/PlistBuddy -c "Add :UIApplicationShortcutItems array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :UIApplicationShortcutItems:0 dict" \
            -c "Add :UIApplicationShortcutItems:0:UIApplicationShortcutItemType string app.gascap.ios.log" \
            -c "Add :UIApplicationShortcutItems:0:UIApplicationShortcutItemTitle string 'Log Fill-Up'" \
            -c "Add :UIApplicationShortcutItems:0:UIApplicationShortcutItemSubtitle string 'Record a gas purchase'" \
            -c "Add :UIApplicationShortcutItems:0:UIApplicationShortcutItemIconType string UIApplicationShortcutIconTypeFavorite" \
            "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :UIApplicationShortcutItems:1 dict" \
            -c "Add :UIApplicationShortcutItems:1:UIApplicationShortcutItemType string app.gascap.ios.findgas" \
            -c "Add :UIApplicationShortcutItems:1:UIApplicationShortcutItemTitle string 'Find Gas'" \
            -c "Add :UIApplicationShortcutItems:1:UIApplicationShortcutItemSubtitle string 'Cheapest stations nearby'" \
            -c "Add :UIApplicationShortcutItems:1:UIApplicationShortcutItemIconType string UIApplicationShortcutIconTypeLocation" \
            "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :UIApplicationShortcutItems:2 dict" \
            -c "Add :UIApplicationShortcutItems:2:UIApplicationShortcutItemType string app.gascap.ios.savings" \
            -c "Add :UIApplicationShortcutItems:2:UIApplicationShortcutItemTitle string 'My Savings'" \
            -c "Add :UIApplicationShortcutItems:2:UIApplicationShortcutItemSubtitle string 'View fill-up history'" \
            -c "Add :UIApplicationShortcutItems:2:UIApplicationShortcutItemIconType string UIApplicationShortcutIconTypeTime" \
            "$PLIST" 2>/dev/null || true
          echo "Info.plist location key:"; /usr/libexec/PlistBuddy -c "Print :NSLocationWhenInUseUsageDescription" "$PLIST"
          echo "Info.plist always-location key:"; /usr/libexec/PlistBuddy -c "Print :NSLocationAlwaysAndWhenInUseUsageDescription" "$PLIST"
          echo "Info.plist Face ID key:"; /usr/libexec/PlistBuddy -c "Print :NSFaceIDUsageDescription" "$PLIST"

      - name: Add Push Notifications entitlement
        script: |
          # @capacitor/push-notifications needs the aps-environment entitlement.
          # "production" is correct for App Store / TestFlight builds (they use the
          # production APNs environment). The provisioning profile already includes
          # push because the App ID app.gascap.ios has Push Notifications enabled.
          cat > ios/App/App/App.entitlements <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
            <key>com.apple.developer.associated-domains</key>
            <array>
              <string>webcredentials:gascap.app</string>
              <string>webcredentials:www.gascap.app</string>
            </array>
          </dict>
          </plist>
          PLIST
          echo "Wrote App.entitlements:"; cat ios/App/App/App.entitlements
          # RELIABLY point the App target at the entitlements file in BOTH build
          # configs via the xcodeproj gem (shipped with CocoaPods). The earlier
          # --archive-flags approach didn't stick, so the entitlement never made it
          # into the signed binary → APNs never issued a token.
          ruby -e "require 'xcodeproj'; p=Xcodeproj::Project.open('ios/App/App.xcodeproj'); t=p.targets.find{|x| x.name=='App'}; raise 'App target not found' unless t; t.build_configurations.each{|c| c.build_settings['CODE_SIGN_ENTITLEMENTS']='App/App.entitlements'}; p.save; puts '✓ Set CODE_SIGN_ENTITLEMENTS=App/App.entitlements on App target'"

      - name: Make AppDelegate forward APNs registration to the push plugin
        script: |
          # The capacitor-generated AppDelegate doesn't forward the remote-notification
          # registration callbacks, so @capacitor/push-notifications never receives the
          # APNs token (register() succeeds, but no 'registration'/'registrationError'
          # event ever fires). Inject the two forwarding methods before the class's
          # final closing brace if they're missing.
          AD="ios/App/App/AppDelegate.swift"
          if grep -q "capacitorDidRegisterForRemoteNotifications" "$AD"; then
            echo "AppDelegate already forwards APNs callbacks — nothing to do."
          else
            perl -0777 -pi -e 's/\}\s*\z/\n    func application(_ application: UIApplication, didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {\n        NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)\n    }\n\n    func application(_ application: UIApplication, didFailToRegisterForRemoteNotificationsWithError error: Error) {\n        NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)\n    }\n}\n/' "$AD"
            echo "✓ Injected APNs forwarding methods into AppDelegate.swift"
          fi
          echo "── AppDelegate.swift ──"; cat "$AD"

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install --repo-update

      - name: Set marketing + build number
        script: |
          cd ios/App
          # Marketing version (CFBundleShortVersionString) — bump per public release
          agvtool new-marketing-version 1.0.1
          # Build number (CFBundleVersion) must be UNIQUE per upload. Look up the latest
          # TestFlight build for the app (by NUMERIC app id, not bundle id) and +1, then
          # floor at Codemagic's own ever-incrementing $BUILD_NUMBER as a safety net so we
          # can never re-use a number ("attribute value already used" upload error).
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_APPLE_ID" 2>/dev/null || echo "")
          [ -z "$LATEST" ] && LATEST=0
          NEXT=$((LATEST + 1))
          if [ "${BUILD_NUMBER:-0}" -gt "$NEXT" ]; then NEXT="$BUILD_NUMBER"; fi
          echo "Latest TestFlight build: $LATEST → setting CFBundleVersion to $NEXT"
          agvtool new-version -all "$NEXT"

      - name: Set up code signing (revoke stale certs, mint fresh, apply)
        script: |
          keychain initialize

          # Apple caps DISTRIBUTION certificates at ~2-3. We mint a fresh one each run
          # (the private key is generated in-build and not persisted), so without cleanup
          # we hit the cap after a couple of builds → "no certificate" → archive fails
          # "requires a provisioning profile". Revoke existing distribution certs first so
          # we always have a free slot. (Safe: revoking a cert does NOT invalidate builds
          # already uploaded to TestFlight; this app's only certs are CI-minted.)
          # Apple has BOTH a modern "Apple Distribution" (DISTRIBUTION) and a legacy
          # "iOS Distribution" (IOS_DISTRIBUTION) certificate type — revoke both so we
          # never miss the ones counting toward the cap.
          echo "Revoking existing distribution certificates to stay under Apple's limit…"
          for CTYPE in DISTRIBUTION IOS_DISTRIBUTION; do
            echo "  checking type $CTYPE"
            for CID in $(app-store-connect certificates list --type "$CTYPE" --json 2>/dev/null \
                | python3 -c "import sys,json; print('\n'.join(c.get('id','') for c in (json.load(sys.stdin) or [])))" 2>/dev/null); do
              echo "  revoking $CTYPE $CID"
              app-store-connect certificates delete "$CID" || true
            done
          done

          # Now mint a fresh distribution cert (needs a private key to sign the CSR) +
          # the App Store profile, install to keychain, and apply to the App target.
          openssl genrsa -out /tmp/dist_cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/dist_cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build the IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      app_store_connect:
        auth: integration
        # Upload to TestFlight AND auto-distribute to our INTERNAL group so the build
        # lands on testers' phones with no manual "add build to group" step. Distributing
        # to an INTERNAL group needs NO beta review (that's only for EXTERNAL groups, which
        # require Beta App Review test info) — so the build stays green.
        submit_to_testflight: true
        beta_groups:
          - GasCap App Testers   # must match the internal group name in App Store Connect exactly
        submit_to_app_store: false
