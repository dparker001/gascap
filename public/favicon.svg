<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#005F4A"/>

  <!-- Scale & center the P pump icon (logo-icon viewBox 0 0 100 118 → fit in ~26x26 at offset 3,2) -->
  <g transform="translate(3.2, 1.8) scale(0.255)">

    <!-- Outer P bowl (dark green thick stroke) -->
    <path d="M 38 22 C 90 22 90 66 38 66"
          stroke="white" stroke-width="10" stroke-linecap="round"/>

    <!-- Inner teal arcs -->
    <path d="M 38 32 C 74 32 74 56 38 56"
          stroke="#1EB68F" stroke-width="6" stroke-linecap="round"/>
    <path d="M 38 39 C 64 39 64 49 38 49"
          stroke="#1EB68F" stroke-width="5" stroke-linecap="round"/>

    <!-- Pump body -->
    <rect x="20" y="20" width="20" height="58" rx="4" fill="white"/>

    <!-- Pump window -->
    <rect x="24" y="30" width="12" height="15" rx="2" fill="#005F4A" opacity="0.35"/>

    <!-- Nozzle arm -->
    <path d="M 25 21 Q 17 16 10 12"
          stroke="white" stroke-width="7" stroke-linecap="round"/>

    <!-- Nozzle head -->
    <rect x="5" y="8" width="8" height="9" rx="2" fill="white"/>
    <rect x="11" y="10" width="6" height="4" rx="1.5" fill="white"/>

    <!-- Connector block -->
    <rect x="38" y="74" width="10" height="7" rx="2" fill="white"/>

    <!-- Hose curve -->
    <path d="M 29 78 Q 29 94 31 97 Q 34 103 43 103 L 47 103"
          stroke="white" stroke-width="8" stroke-linecap="round"/>

  </g>
</svg>
