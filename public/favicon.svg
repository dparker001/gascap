<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 118">
  <!--
    GasCap™ P/pump logo — closed filled rings only.

    All P-bowl rings share the same y extents (14 → 67) and differ only
    in the x-direction control point (Cx).  Each ring is two opposing
    bezier arcs joined at x = 41:

      M 41 14  C Cx_outer 14  Cx_outer 67  41 67   ← CW (down-right)
               C Cx_inner 67  Cx_inner 14  41 14   ← CCW (up-right)
      Z

    Midpoint x-reach = 0.125·41 + 0.75·Cx + 0.125·41 = 10.25 + 0.75·Cx

    Cx  97 → midpoint x ≈ 83   (outer edge)
    Cx  70 → midpoint x ≈ 63   (dark-green / teal boundary)
    Cx  65 → midpoint x ≈ 59   (teal-1 / teal-2 boundary)
    Cx  60 → midpoint x ≈ 55   (teal-2 inner = white-space boundary)

    Band widths at mid-height: green ≈ 20 u | teal-1 ≈ 4 u | teal-2 ≈ 4 u | white ≈ 12 u
  -->

  <!-- ── ① DARK GREEN RING (Cx outer=97, Cx inner=70) ────────── -->
  <path d="M 41 14 C 97 14 97 67 41 67 C 70 67 70 14 41 14 Z"
        fill="#005F4A"/>

  <!-- ── ② TEAL RING 1 (Cx outer=70, Cx inner=65) ───────────── -->
  <path d="M 41 14 C 70 14 70 67 41 67 C 65 67 65 14 41 14 Z"
        fill="#1EB68F"/>

  <!-- ── ③ TEAL RING 2 thinner (Cx outer=65, Cx inner=60) ───── -->
  <path d="M 41 14 C 65 14 65 67 41 67 C 60 67 60 14 41 14 Z"
        fill="#1EB68F"/>

  <!-- ── PUMP BODY covers the left edges of all rings ─────────── -->
  <rect x="22" y="14" width="21" height="67" rx="4" fill="#005F4A"/>

  <!-- Pump window / display screen -->
  <rect x="26" y="25" width="13" height="16" rx="2.5"
        fill="#1EB68F" fill-opacity="0.40"/>

  <!-- ── NOZZLE ARM ──────────────────────────────────────────── -->
  <g fill="none">
    <path d="M 27 17 Q 19 12 12 8"
          fill="none"
          stroke="#005F4A" stroke-width="7.5" stroke-linecap="round"/>
  </g>

  <!-- Nozzle tip — fully filled, no stroke ambiguity -->
  <rect x="5"  y="4"  width="10" height="10" rx="2.5" fill="#005F4A"/>
  <rect x="11" y="7"  width="7"  height="4.5" rx="2"  fill="#005F4A"/>

  <!-- ── HOSE + CONNECTOR ───────────────────────────────────── -->
  <rect x="41" y="77" width="11" height="7" rx="2" fill="#005F4A"/>

  <g fill="none">
    <path d="M 31 81 Q 31 98 33 101 Q 37 109 47 109 L 54 109"
          fill="none"
          stroke="#005F4A" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

</svg>
